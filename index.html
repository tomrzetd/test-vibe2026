<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Cat's Cradle · Hyper-Glow Edition</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.4/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #040408;
            font-family: 'Segoe UI', system-ui, sans-serif;
            cursor: crosshair;
        }
        canvas {
            display: block;
        }

        /* ---- Cyber HUD Overlay ---- */
        #hud {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            z-index: 20;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding: 0 20px;
            width: 100%;
            justify-content: center;
        }
        .hud-item {
            background: rgba(6, 6, 14, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 16px;
            padding: 12px 24px;
            font-size: 12px;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.1), inset 0 0 10px rgba(0, 240, 255, 0.05);
            transition: all 0.4s ease;
        }
        .hud-item .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        .hud-item .dot.cyan { background: #00f0ff; box-shadow: 0 0 15px #00f0ff; }
        .hud-item .dot.magenta { background: #ff0077; box-shadow: 0 0 15px #ff0077; }
        .hud-item .dot.green { background: #39ff14; box-shadow: 0 0 15px #39ff14; }
        
        .hud-item .label {
            opacity: 0.5;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 10px;
        }
        .hud-item .value {
            font-weight: 700;
            color: #fff;
            font-family: monospace;
            font-size: 15px;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        #status {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(6, 6, 14, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 10px 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #status .highlight {
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.6);
        }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        #loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #05050a; z-index: 100; transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        
        .spinner {
            width: 64px; height: 64px;
            border: 3px solid rgba(0, 240, 255, 0.05);
            border-top-color: #00f0ff; border-bottom-color: #ff0077;
            border-radius: 50%; animation: spin 1s cubic-bezier(0.6, 0.2, 0.2, 0.8) infinite;
            margin-bottom: 24px; filter: drop-shadow(0 0 15px rgba(0,240,255,0.4));
        }
        #loading p {
            color: rgba(255, 255, 255, 0.6); font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
        }
        #loading p span { color: #00f0ff; font-weight: bold; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <p>Menghubungkan <span>Neon Plasma Matrix</span></p>
    </div>

    <div id="status">⚡ <span class="highlight">Menginisialisasi Kamera</span></div>

    <div id="hud">
        <div class="hud-item">
            <span class="dot cyan"></span>
            <span class="label">Tangan L</span>
            <span class="value" id="hud-hand1">—</span>
        </div>
        <div class="hud-item">
            <span class="dot magenta"></span>
            <span class="label">Tangan R</span>
            <span class="value" id="hud-hand2">—</span>
        </div>
        <div class="hud-item">
            <span class="dot green"></span>
            <span class="label">Energi Plasma</span>
            <span class="value" id="hud-strings">0</span>
        </div>
    </div>

    <script>
        const CONFIG = {
            maxParticles: 300,
            particleLife: 70,
            glowIntensity: 1.5,
            colorSpeed: 0.02,
            stringSmooth: 0.25, // Dipercepat agar pelacakan terasa instan & responsif
        };

        let capture;
        let handLandmarks = [];
        let isLoaded = false;
        let frameCounter = 0;

        let particles = [];
        const TIP_INDICES = [4, 8, 12, 16, 20];
        let smoothPoints = [[], []];
        let prevPoints = [[], []]; // Digunakan untuk kalkulasi kecepatan ayunan tangan

        const hudHand1 = document.getElementById('hud-hand1');
        const hudHand2 = document.getElementById('hud-hand2');
        const hudStrings = document.getElementById('hud-strings');
        const statusEl = document.getElementById('status');

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 1);
            
            // Inisialisasi posisi pelicilan gerak (Smoothing Arrays)
            for (let h = 0; h < 2; h++) {
                smoothPoints[h] = [];
                prevPoints[h] = [];
                for (let f = 0; f < TIP_INDICES.length; f++) {
                    smoothPoints[h][f] = { x: width / 2, y: height / 2 };
                    prevPoints[h][f] = { x: width / 2, y: height / 2 };
                }
            }

            // P5 Capture Setup
            capture = createCapture(VIDEO);
            capture.size(640, 480);
            capture.hide();

            // Inisialisasi MediaPipe Hands
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
            });

            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.6,
                minTrackingConfidence: 0.6
            });

            hands.onResults(onResults);

            // Menggunakan MediaPipe Camera Utility resmi bawaan library
            const camera = new Camera(capture.elt, {
                onFrame: async () => {
                    await hands.send({ image: capture.elt });
                },
                width: 640,
                height: 480
            });
            camera.start();
        }

        function onResults(results) {
            if (!isLoaded) {
                isLoaded = true;
                document.getElementById('loading').classList.add('hidden');
            }
            handLandmarks = results.multiHandLandmarks || [];
        }

        // ---- Particle Engine Super Glow ----
        function emitParticles(x, y, colorHue, speedMultiplier = 1, count = 2) {
            for (let i = 0; i < count; i++) {
                if (particles.length >= CONFIG.maxParticles) {
                    particles.shift();
                }
                const angle = random(TWO_PI);
                const speed = random(1.5, 4.5) * speedMultiplier;
                particles.push({
                    x, y,
                    vx: cos(angle) * speed,
                    vy: sin(angle) * speed,
                    life: CONFIG.particleLife * random(0.6, 1.2),
                    maxLife: CONFIG.particleLife,
                    size: random(3, 7),
                    hue: (colorHue + random(-15, 15)) % 360,
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.96; // Gesekan udara halus
                p.vy *= 0.96;
                p.life -= 1;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawParticles() {
            for (const p of particles) {
                const progress = p.life / p.maxLife;
                const alpha = map(progress, 0, 1, 0, 1);
                const currentSize = p.size * progress;

                drawingContext.shadowBlur = currentSize * 3 * CONFIG.glowIntensity;
                drawingContext.shadowColor = `hsla(${p.hue}, 100%, 60%, ${alpha})`;
                
                noStroke();
                fill(p.hue, 95, 100, alpha);
                circle(p.x, p.y, currentSize);
            }
            drawingContext.shadowBlur = 0; // Reset wajib p5
        }

        // ---- Main Render Loop ----
        function draw() {
            frameCounter++;
            background(240, 40, 4, 1); // Ruang gelap cyberpunk bening

            // Proteksi pembagian nilai nol aman & render background feed digital
            if (capture && capture.width > 0 && capture.loadedmetadata) {
                push();
                translate(width, 0);
                scale(-1, 1); // Efek Cermin

                const vRatio = capture.width / capture.height;
                const cRatio = width / height;
                let dw, dh, dx, dy;
                if (vRatio > cRatio) {
                    dh = height; dw = height * vRatio;
                    dx = (width - dw) / 2; dy = 0;
                } else {
                    dw = width; dh = width / vRatio;
                    dx = 0; dy = (height - dh) / 2;
                }
                
                // Berikan filter visual kegelapan matriks pada kamera agar efek neon menonjol
                tint(200, 70, 20, 0.4); 
                image(capture, dx, dy, dw, dh);
                pop();

                // Cyber Grid & Scanline Effect
                stroke(190, 100, 30, 0.04);
                strokeWeight(1);
                for (let i = 0; i < height; i += 6) {
                    line(0, i, width, i);
                }
            }

            // Pemrosesan Inti Core Hand & Cradle
            drawHandsAndStrings();
            drawParticles();
            updateParticles();
            updateHUD();

            // Status Bar Handler
            if (handLandmarks.length === 2) {
                statusEl.innerHTML = '⚡ <span class="highlight">CRADLE NYALA</span> · Energi Stabil';
            } else if (handLandmarks.length === 1) {
                statusEl.innerHTML = '✋ 1 Tangan Terdeteksi · Hadapkan <span class="highlight">Kedua Tangan</span>';
            } else {
                statusEl.innerHTML = '👋 Hubungkan <span class="highlight">Tangan Anda</span> ke Kamera';
            }
        }

        function drawHandsAndStrings() {
            if (!handLandmarks.length) return;

            const getCoords = (lm) => ({
                x: width - lm.x * width,
                y: lm.y * height,
            });

            const hueBase = (frameCounter * 1.5) % 360;

            // Loop Gambar Sendi & Kalkulasi Kecepatan
            for (let h = 0; h < handLandmarks.length; h++) {
                const landmarks = handLandmarks[h];
                const handHue = (hueBase + (h * 180)) % 360; // Tangan kiri & kanan punya warna kontras berseberangan

                for (let j = 0; j < landmarks.length; j++) {
                    const pt = getCoords(landmarks[j]);
                    const isTip = TIP_INDICES.includes(j);
                    
                    if (isTip) {
                        const fIdx = TIP_INDICES.indexOf(j);
                        // Ambil posisi terdahulu
                        const prev = prevPoints[h][fIdx];
                        // Hitung Kecepatan Ayunan Tangan (Velocity)
                        const velocity = dist(pt.x, pt.y, prev.x, prev.y);

                        // Ledakan partikel ekstra jika tangan digerakkan secara responsif (cepat)
                        if (velocity > 12) {
                            emitParticles(pt.x, pt.y, handHue, velocity * 0.15, 4);
                        } else if (frameCounter % 2 === 0) {
                            emitParticles(pt.x, pt.y, handHue, 0.5, 1);
                        }

                        // Simpan koordinat saat ini untuk kalkulasi frame berikutnya
                        prevPoints[h][fIdx] = { x: pt.x, y: pt.y };
                    }

                    // Render Sendi Glowing Berpendar
                    drawingContext.shadowBlur = (isTip ? 25 : 10) * CONFIG.glowIntensity;
                    drawingContext.shadowColor = `hsla(${handHue}, 100%, 60%, 0.8)`;
                    noStroke();
                    fill(handHue, 90, 100, 0.9);
                    circle(pt.x, pt.y, isTip ? 12 : 6);
                }

                // Terapkan Interpolasi Linear (Lerp) agar gerak senar halus bebas patah-patah
                for (let f = 0; f < TIP_INDICES.length; f++) {
                    const idx = TIP_INDICES[f];
                    const raw = getCoords(landmarks[idx]);
                    const currentSmooth = smoothPoints[h][f];
                    smoothPoints[h][f] = {
                        x: lerp(currentSmooth.x, raw.x, CONFIG.stringSmooth),
                        y: lerp(currentSmooth.y, raw.y, CONFIG.stringSmooth),
                    };
                }
            }

            // ---- RAJUTAN SENAR CRADLE (Ketika 2 Tangan Aktif) ----
            if (handLandmarks.length === 2) {
                const h1Hue = hueBase;
                const h2Hue = (hueBase + 180) % 360;

                for (let i = 0; i < TIP_INDICES.length; i++) {
                    const p1 = smoothPoints[0][i];
                    const p2 = smoothPoints[1][i];

                    const d = dist(p1.x, p1.y, p2.x, p2.y);
                    const mixHue = lerp(h1Hue, h2Hue, 0.5);

                    // Efek Senar Plasma Bergetar Aktual (Vibrating String)
                    drawingContext.shadowBlur = 30 * CONFIG.glowIntensity;
                    drawingContext.shadowColor = `hsla(${mixHue}, 100%, 50%, 0.65)`;
                    stroke(mixHue, 95, 100, 0.85);
                    strokeWeight(map(d, 50, 600, 6, 1.5, true));
                    
                    // Render Senar Bergelombang Menggunakan Teknik Gelombang Sinus Per-Segmen
                    noFill();
                    beginShape();
                    const segments = 12;
                    for (let s = 0; s <= segments; s++) {
                        let t = s / segments;
                        let sx = lerp(p1.x, p2.x, t);
                        let sy = lerp(p1.y, p2.y, t);
                        
                        // Kalkulasi Perpendicular Offset untuk Gelombang Getar Plasma
                        let angle = atan2(p2.y - p1.y, p2.x - p1.x) + HALF_PI;
                        let wave = sin(t * PI + frameCounter * 0.3) * 6 * sin(frameCounter * 0.04);
                        sx += cos(angle) * wave;
                        sy += sin(angle) * wave;
                        vertex(sx, sy);
                    }
                    endShape();

                    // Energy Bead (Butiran Inti Cahaya Mengalir di Jalur Senar)
                    let beadProgress = (frameCounter * 0.015 + (i * 0.2)) % 1.0;
                    let bx = lerp(p1.x, p2.x, beadProgress);
                    let by = lerp(p1.y, p2.y, beadProgress);
                    
                    drawingContext.shadowBlur = 20;
                    drawingContext.shadowColor = '#ffffff';
                    fill(0, 0, 100, 1);
                    circle(bx, by, 8);

                    // Hubungkan Tali Silang (Cross Weave) Otomatis Antar Jari Tetangga
                    const nextIdx = (i + 1) % TIP_INDICES.length;
                    const p2next = smoothPoints[1][nextIdx];
                    
                    stroke((mixHue + 40) % 360, 90, 90, 0.3);
                    strokeWeight(1);
                    line(p1.x, p1.y, p2next.x, p2next.y);
                }
            }
            drawingContext.shadowBlur = 0;
        }

        // ---- Pembaruan Status Nilai UI ----
        function updateHUD() {
            const count = handLandmarks.length;
            if (count >= 1) {
                hudHand1.textContent = `ONLINE`;
                hudHand1.style.color = "#00f0ff";
            } else {
                hudHand1.textContent = '—';
                hudHand1.style.color = "#fff";
            }
            
            if (count >= 2) {
                hudHand2.textContent = `ONLINE`;
                hudHand2.style.color = "#ff0077";
            } else {
                hudHand2.textContent = '—';
                hudHand2.style.color = "#fff";
            }

            // Total kalkulasi kalkulasi aktif senar jaring terpasang
            hudStrings.textContent = count === 2 ? "15 JALUR PLASMA" : count === 1 ? "0 REAKSI" : "0";
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
